<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0D3B2E" />
    <title>MilkTea Premium - Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Be Vietnam Pro", Inter, system-ui, sans-serif;
        background: #fffdf8;
        color: #1f1710;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 1.5rem;
        background:
          radial-gradient(circle at 14% 10%, rgba(205, 237, 246, 0.52), transparent 24rem),
          radial-gradient(circle at 88% 18%, rgba(211, 168, 106, 0.22), transparent 24rem),
          linear-gradient(180deg, #fffdf8 0%, #f8f5ee 100%);
      }

      main {
        max-width: 34rem;
        padding: 2rem;
        text-align: center;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.82);
        border-radius: 2rem;
        box-shadow: 0 24px 70px rgba(48, 35, 24, 0.12);
      }

      h1 {
        margin: 0;
        color: #0d3b2e;
        font-size: clamp(2rem, 8vw, 3rem);
        line-height: 1;
      }

      p {
        color: #6f5f51;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        min-height: 3rem;
        align-items: center;
        justify-content: center;
        margin-top: 1rem;
        padding: 0 1.5rem;
        color: white;
        font-weight: 700;
        text-decoration: none;
        background: #0d3b2e;
        border-radius: 9999px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bạn đang ngoại tuyến</h1>
      <p>MilkTea Premium đã lưu sẵn khung trải nghiệm. Vui lòng kết nối mạng để xem thực đơn, hình ảnh và cập nhật mới nhất.</p>
      <a href="/">Thử lại</a>
    </main>
  </body>
</html>
