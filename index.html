<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MilkTea Premium offers a modern bubble tea experience with handcrafted blends, premium ingredients, and elegant presentation." />
    <meta name="keywords" content="bubble tea, premium milk tea, matcha, fruit tea, tea shop, artisanal drinks" />
    <meta name="author" content="MilkTea Premium" />
    <meta name="theme-color" content="#0D3B2E" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="MilkTea Premium" />
    <meta property="og:description" content="Discover premium bubble tea crafted for a modern taste." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (() => {
        const storageKey = 'milktea-premium-theme';
        const validThemes = ['light', 'dark', 'system'];

        try {
          const preference = validThemes.includes(localStorage.getItem(storageKey))
            ? localStorage.getItem(storageKey)
            : 'system';
          const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          const resolvedTheme = preference === 'system' ? systemTheme : preference;
          const root = document.documentElement;

          root.dataset.theme = resolvedTheme;
          root.dataset.themePreference = preference;
          root.style.colorScheme = resolvedTheme;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute('content', resolvedTheme === 'dark' ? '#101512' : '#0D3B2E');
        } catch {
          document.documentElement.dataset.theme = 'light';
          document.documentElement.dataset.themePreference = 'system';
        }
      })();
    </script>
    <link rel="icon" href="favicon.svg" />
    <title>MilkTea Premium | Handcrafted Bubble Tea</title>
  </head>
  <body class="antialiased">
    <a href="#main-content" class="skip-link">Skip to content</a>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
