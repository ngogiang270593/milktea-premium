    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" /></noscript>
    <script>
      (() => {
        const storageKey = 'milktea-preferences';
        const legacyThemeKey = 'milktea-premium-theme';
        const themes = {
          'green-tea': {
            scheme: 'light',
            meta: '#0D3B2E',
            vars: {
              '--color-bg': '#fffdf8',
              '--color-bg-soft': '#f8f5ee',
              '--color-surface': 'rgba(255, 255, 255, 0.72)',
              '--color-surface-strong': 'rgba(255, 255, 255, 0.92)',
              '--color-border': 'rgba(216, 200, 184, 0.78)',
              '--color-text': '#1f1710',
              '--color-text-soft': '#4d4035',
              '--color-muted': '#7b6a5a',
              '--color-brand': '#0d3b2e',
              '--color-brand-hover': '#143f31',
              '--color-gold': '#d3a86a',
              '--color-mint': '#cdebf6',
              '--color-peach': '#f8c3b6',
              '--shadow-soft': '0 18px 50px rgba(48, 35, 24, 0.1)',
              '--shadow-strong': '0 30px 90px rgba(48, 35, 24, 0.16)',
              '--page-gradient': 'radial-gradient(circle at 14% 10%, rgba(205, 237, 246, 0.42), transparent 24rem), radial-gradient(circle at 88% 18%, rgba(211, 168, 106, 0.2), transparent 24rem), linear-gradient(180deg, #fffdf8 0%, #f8f5ee 100%)'
            }
          },
          dark: {
            scheme: 'dark',
            meta: '#101512',
            vars: {
              '--color-bg': '#101512',
              '--color-bg-soft': '#17201b',
              '--color-surface': 'rgba(22, 30, 26, 0.76)',
              '--color-surface-strong': 'rgba(22, 30, 26, 0.94)',
              '--color-border': 'rgba(205, 237, 246, 0.16)',
              '--color-text': '#f7f5ee',
              '--color-text-soft': '#e4d8cc',
              '--color-muted': '#c7b8aa',
              '--color-brand': '#9fe0c4',
              '--color-brand-hover': '#cdebf6',
              '--color-gold': '#e2bc7c',
              '--color-mint': '#234a43',
              '--color-peach': '#7f4c47',
              '--shadow-soft': '0 18px 54px rgba(0, 0, 0, 0.32)',
              '--shadow-strong': '0 30px 100px rgba(0, 0, 0, 0.42)',
              '--page-gradient': 'radial-gradient(circle at 12% 12%, rgba(35, 74, 67, 0.58), transparent 24rem), radial-gradient(circle at 88% 20%, rgba(226, 188, 124, 0.16), transparent 24rem), linear-gradient(180deg, #101512 0%, #17201b 100%)'
            }
          }
        };

        try {
          const storedSettings = JSON.parse(localStorage.getItem(storageKey) || '{}');
          const stored = storedSettings.theme || localStorage.getItem(legacyThemeKey);
          const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const preference = stored || 'green-tea';
          const resolved = preference === 'system' ? (prefersDark ? 'dark' : 'green-tea') : preference;
          const theme = themes[resolved] || themes['green-tea'];
          const root = document.documentElement;

          Object.entries(theme.vars).forEach(([property, value]) => root.style.setProperty(property, value));
          root.dataset.theme = theme.scheme === 'dark' ? 'dark' : 'light';
          root.dataset.themeName = resolved;
          root.dataset.themePreference = preference;
          root.style.colorScheme = theme.scheme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', theme.meta);
        } catch {
          document.documentElement.dataset.theme = 'light';
          document.documentElement.dataset.themeName = 'green-tea';
          document.documentElement.dataset.themePreference = 'green-tea';
        }
      })();
    </script>
    <style>
      .app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        gap: 1rem;
        color: #0d3b2e;
        background:
          radial-gradient(circle at 50% 34%, rgba(205, 237, 246, 0.72), transparent 18rem),
          linear-gradient(180deg, #fffdf8 0%, #f8f5ee 100%);
        transition: opacity 260ms ease, visibility 260ms ease;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: #fffdf8;
      }

      #app {
        min-height: 100vh;
      }

      .app-splash.is-hidden {
        visibility: hidden;
        opacity: 0;
      }

      .app-splash-logo {
        display: grid;
        width: 5rem;
        height: 5rem;
        place-items: center;
        color: white;
        font: 800 1.5rem/1 "Be Vietnam Pro", Inter, sans-serif;
        background: #0d3b2e;
        border-radius: 1.75rem;
        box-shadow: 0 24px 70px rgba(13, 59, 46, 0.18);
      }

      .app-splash p {
        margin: 0;
        font: 700 1rem/1.2 "Be Vietnam Pro", Inter, sans-serif;
        letter-spacing: 0;
      }
    </style>
    <title>MilkTea Premium - Trà sữa cao cấp</title>

  <body class="antialiased">
    <a href="#main-content" class="skip-link">Bỏ qua đến nội dung chính</a>
    <div id="app-splash" class="app-splash" role="status" aria-live="polite">
      <div class="app-splash-logo" aria-hidden="true">MP</div>
      <p>MilkTea Premium</p>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
