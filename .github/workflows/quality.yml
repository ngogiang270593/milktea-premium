name: Quality

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Component tests
        run: npm run test:component

      - name: Integration tests
        run: npm run test:integration
